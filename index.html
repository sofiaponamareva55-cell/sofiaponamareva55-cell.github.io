<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const URL = 'https://tqtpdtforramqzhjqalf.supabase.co';
const KEY = 'sb_publishable_byK1ZC0fIZS-UU8HOWF43Q_JpBt1f9h';
supabase = createClient(URL, KEY);

const MY_ID = 'ae570762-81d7-4ace-99da-b2c46a19ab88';

window.changeStatus = async (text, color) => {
    const { error } = await supabase
        .from('profiles')
        .update({ status: text, color: color })
        .eq('id', MY_ID);

    if (error) {
        alert('Ошибка! Проверьте RLS политики в Supabase.');
        console.error(error);
    } else {
        fetchGroup();
    }
};

async function fetchGroup() {
    const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .order('username', { ascending: true });

    if (error) return console.error(error);

    const list = document.getElementById('grouplist');
    list.innerHTML = data.map(user => `
        <div class="user-item">
            <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
            <div style="flex-grow: 1;">
                <strong>${user.username}</strong><br>
                <small style="color: #666;">${user.status || 'Статус не задан'}</small>
            </div>
        </div>
    `).join('');

    const me = data.find(u => u.id === MY_ID);
    if (me) document.getElementById('myinfo').innerText = `Вы зашли как: ${me.username}`;
}

fetchGroup();
setInterval(fetchGroup, 5000);
</script>
</body>
</html>
