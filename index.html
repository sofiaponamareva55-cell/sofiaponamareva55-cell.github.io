<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Monitor Pro</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #333;
            --primary: #4285F4;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --success: #2ecc71;
            --gray: #95a5a6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }

        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .user-card { text-align: center; }
        .user-name { font-weight: bold; font-size: 18px; margin-bottom: 10px; display: block; }
        .timer-display { font-size: 28px; font-weight: bold; color: var(--primary); margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        /* Кнопка старта/стопа */
        .btn-main { background: var(--success); color: white; width: 100%; grid-column: span 2; }
        .btn-main.active { background: var(--danger) !important; }
        
        .btn-break { background: var(--warning); color: white; }
        .btn-exit { background: var(--gray); color: white; }

        .section-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .user-list { display: flex; flex-direction: column; gap: 8px; }
        .user-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-radius: 12px; background: #fff; border: 1px solid #eee;
        }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 8px; }
        .online-dot.active { background: var(--success); box-shadow: 0 0 5px var(--success); }

        .chat-box { height: 150px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 10px; font-size: 13px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        .chat-input-group { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-send { background: var(--success); color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-section" class="card" style="text-align: center;">
        <h1>Work Monitor</h1>
        <button id="btn-login" style="background: var(--primary); color: white; width: 100%;">Войти через Google</button>
    </div>

    <div id="app-section" class="hidden">
        <div class="card user-card">
            <span id="display-name" class="user-name">Загрузка...</span>
            <div class="timer-display">
                <span>⏱️</span> <span id="stopwatch">00:00:00</span>
            </div>
            <div class="btn-grid">
                <button id="session-btn" class="btn-main" onclick="handleSession()">🚀 Начать сессию</button>
                <button class="btn-break" onclick="togglePause()">☕ Перерыв</button>
                <button class="btn-exit" onclick="logout()">Выход</button>
            </div>
        </div>

        <div class="card">
            <div class="section-title">👥 Монитор группы</div>
            <div id="group-list" class="user-list"></div>
        </div>

        <div class="card">
            <div class="section-title">💬 Общий чат</div>
            <div id="chat-messages" class="chat-box"></div>
            <div class="chat-input-group">
                <input type="text" id="chat-input" placeholder="Сообщение...">
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
   import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // Конфигурация твоей новой базы
        const URL = 'https://tqtpdtforramqzhjqalf.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxdHBkdGZvcnJhbXF6aGpxYWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDQyNDUsImV4cCI6MjA5MTM4MDI0NX0.c6bFblzCpMXn0ssNZD8BeOlzk21aTdO1fjxhPEVluuk';

    const supabase = createClient(URL, KEY);

    let user = null;
    let profiles = [];
    let seconds = 0;
    let timerInterval = null;
    let isPaused = false;
    let isSessionActive = false;

    // Инициализация
    async function init() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            user = session.user;
            showApp();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
        }
    }

    function showApp() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('display-name').innerText = user.user_metadata.full_name || user.email;
        
        setupRealtime();
        fetchInitialData();
        trackPresence();
        
        setInterval(renderUserList, 1000);
    }

    // ЛОГИКА СЕССИИ (Исправлено переключение кнопки)
    window.handleSession = async () => {
        const btn = document.getElementById('session-btn');
        
        if (!isSessionActive) {
            isSessionActive = true;
            isPaused = false;
            seconds = 0;
            const startTime = new Date().toISOString();
            
            btn.innerText = "🛑 Завершить сессию";
            btn.classList.add('active');

            await supabase.from('profiles.').upsert({
                id: user.id,
                username: user.user_metadata.full_name || user.email,
                status: 'Учится',
                started_at: startTime
            });

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    updateTimerDisplay();
                }
            }, 1000);
        } else {
            isSessionActive = false;
            clearInterval(timerInterval);
            btn.innerText = "🚀 Начать сессию";
            btn.classList.remove('active');
            
            await supabase.from('profiles.').update({ 
                status: 'Дома',
                started_at: null 
            }).eq('id', user.id);
            
            seconds = 0;
            updateTimerDisplay();
        }
    };

    function updateTimerDisplay() {
        const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('stopwatch').innerText = `${h}:${m}:${s}`;
    }

    window.togglePause = () => {
        if (!isSessionActive) return;
        isPaused = !isPaused;
        const btn = document.querySelector('.btn-break');
        btn.innerText = isPaused ? '▶️ Продолжить' : '☕ Перерыв';
        btn.style.background = isPaused ? '#2ecc71' : '#f1c40f';
    };

    // МОНИТОР ГРУППЫ (Исправлено отображение имен из Google)
    async function fetchInitialData() {
        const { data } = await supabase.from('profiles.').select('*');
        profiles = data || [];
        renderUserList();
        fetchChat();
    }

    function setupRealtime() {
        supabase.channel('db-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles.' }, payload => {
                if (payload.eventType === 'INSERT') {
                    profiles.push(payload.new);
                } else if (payload.eventType === 'UPDATE') {
                    profiles = profiles.map(p => p.id === payload.new.id ? payload.new : p);
                }
                renderUserList();
            })
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                addMessageToUI(payload.new);
            })
            .subscribe();
    }

    function trackPresence() {
        const channel = supabase.channel('online-users');
        channel.on('presence', { event: 'sync' }, () => {
            window.currentOnlineUsers = Object.values(channel.presenceState()).flat().map(i => i.user_id);
            renderUserList();
        }).subscribe(async (status) => {
            if (status === 'SUBSCRIBED') await channel.track({ user_id: user.id });
        });
    }

    function renderUserList() {
        const container = document.getElementById('group-list');
        container.innerHTML = profiles.map(p => {
            const isOnline = (window.currentOnlineUsers || []).includes(p.id);
            let timeStr = "0ч 0м 0с";
            if (p.started_at) {
                const diff = Math.floor((new Date() - new Date(p.started_at)) / 1000);
                const h = Math.floor(diff / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;
                timeStr = `${h}ч ${m}м ${s}с`;
            }

            return `
                <div class="user-item">
                    <div>
                        <span class="online-dot ${isOnline ? 'active' : ''}"></span>
                        <strong>${p.username || 'Участник'}</strong>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 11px; color: #666;">🏠 ${p.status || 'Дома'}</div>
                        <div style="font-size: 11px; color: var(--primary); font-weight: bold;">⏱️ ${timeStr}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ЧАТ
    async function fetchChat() {
        const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(30);
        if (data) data.forEach(addMessageToUI);
    }

    window.sendMessage = async () => {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        await supabase.from('messages').insert({
            user_id: user.id,
            user_name: user.user_metadata.full_name || user.email,
            content: input.value.trim()
        });
        input.value = '';
    };

    function addMessageToUI(msg) {
        const box = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.innerHTML = `<strong>${msg.user_name}:</strong> ${msg.content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // КНОПКА ВЫХОДА (Исправлено)
    window.logout = async () => {
        await supabase.auth.signOut();
        localStorage.clear();
        location.reload();
    };

    document.getElementById('btn-login').onclick = () => supabase.auth.signInWithOAuth({ provider: 'google' });

    init();
</script>
</body>
</html>
